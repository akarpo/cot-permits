name: Update permits

on:
  schedule:
    # Daily at 11:17 UTC (~7:17 AM Eastern). Off-the-hour to avoid scheduler
    # congestion on GitHub's runners.
    - cron: '17 11 * * *'
  workflow_dispatch: {}  # manual run button in the Actions tab

permissions:
  contents: write   # bot commits regenerated index.html back to main
  issues: write     # verifier opens an issue if BSA GUIDs drift

concurrency:
  group: update-permits
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          npm install -g wrangler

      - name: Run incremental update (scrape Troy + resolve BSA GUIDs + upload to R2)
        run: python update_permits.py --no-git
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit and push if index.html changed
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "chore: update permits ($(date -u +%Y-%m-%d))"
          git push

      - name: Verify BSA GUIDs (daily spot-check)
        id: verify
        if: success() || failure()
        continue-on-error: true
        run: |
          set +e
          python verify_bsa_guids.py
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Open or update issue if BSA GUIDs drifted
        if: steps.verify.outputs.rc == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reuse an existing open issue if one is already open — avoid spam.
          existing=$(gh issue list \
                       --state open \
                       --search 'in:title "BSA GUID verification failed"' \
                       --json number --jq '.[0].number' || echo "")
          {
            cat verify-report.txt
            echo ""
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > issue_body.txt
          if [ -n "$existing" ]; then
            echo "Commenting on existing issue #$existing"
            gh issue comment "$existing" --body-file issue_body.txt
          else
            echo "Opening new issue"
            gh issue create \
              --title "BSA GUID verification failed ($(date -u +%Y-%m-%d))" \
              --body-file issue_body.txt
          fi
